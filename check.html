<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>CHECK_TASK</title>
</head>
<body>
<script>
  // 🔹 從網址讀 ?status=
  const params = new URLSearchParams(location.search);
  const status = params.get("status");

  if (status === "HAS_TASK") {
    document.title = "HAS_TASK";
    document.body.innerText = "HAS_TASK";
  } else {
    document.title = "NO_TASK";
    document.body.innerText = "NO_TASK";
  }
</script>
</body>
</html>
